<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valheim Server Manager</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="https://www.valheimgame.com/favicon.ico">

  <script src="js/config.js"></script>
  <script type="text/javascript" src="js/index.js"></script>

  <script src="https://cdn.amplify.aws/packages/core/4.3.0/aws-amplify-core.min.js"
    integrity="sha384-7Oh+5w0l7XGyYvSqbKi2Q7SA5K640V5nyW2/LEbevDQEV1HMJqJLA1A00z2hu8fJ" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://cdn.amplify.aws/packages/auth/4.3.8/aws-amplify-auth.min.js"
    integrity="sha384-jfkXCEfYyVmDXYKlgWNwv54xRaZgk14m7sjeb2jLVBtUXCD2p+WU8YZ2mPZ9Xbdw" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
</head>

<body onload="init()">
  <nav>
    <ul class="top-nav" id="dropdownClick">
      <li><a id="home">Home</a></li>
      <li><a href="#refresh" onclick="location.reload()">Refresh</a></li>
      <li class="sep"><a>&nbsp;|&nbsp;</a></li>
      <li><a id="server">Server</a></li>
      <li><a id="cfnstack">CFN</a></li>
      <li class="nav-billing">
        <div class="billing-item">
          <span class="billing-label">MTD</span>
          <span id="billingCurrent" class="billing-value">&mdash;</span>
        </div>
        <div class="billing-divider"></div>
        <div class="billing-item">
          <span class="billing-label">Forecast</span>
          <span id="billingForecast" class="billing-value">&mdash;</span>
        </div>
      </li>
      <li class="top-nav-right"><a href="javascript:void(0);" onclick="logout()">Sign Out</a></li>
      <li class="dropdownIcon"><a href="javascript:void(0);" onclick="dropdownMenu()">&#9776;</a></li>
    </ul>
  </nav>

  <div class="hero">
    <img src="img/valheim.jpg" alt="Valheim" />
  </div>

  <div class="content">

    <p class="section-label">Server Status</p>
    <div class="mcInfo">
      <div class="card">
        <h3>DNS</h3>
        <div class="copyable-value">
          <p class="Loading">Loading...</p>
          <p id="mcInfoDNS"></p>
          <button class="btn-copy" style="display:none;" onclick="copyToClipboard('mcInfoDNS', this, 2456)" title="Copy DNS">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="card">
        <h3>State</h3>
        <p class="Loading">Loading...</p>
        <p id="mcInfoState"></p>
      </div>
      <div class="card">
        <h3>IP</h3>
        <div class="copyable-value">
          <p class="Loading">Loading...</p>
          <p id="mcInfoIP"></p>
          <button class="btn-copy" style="display:none;" onclick="copyToClipboard('mcInfoIP', this, 2456)" title="Copy IP">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="card">
        <h3>Type</h3>
        <p class="Loading">Loading...</p>
        <p id="mcInfoType"></p>
      </div>
    </div>

    <hr class="divider">

    <p class="section-label">Controls</p>
    <div class="mcControl mcControl--two">
      <div class="card">
        <h3>Power</h3>
        <button id="powerButton" onclick="toggleServer()">Start</button>
      </div>
      <div class="card">
        <label for="instanceSize">Resize</label>
        <div class="resize-row">
          <select name="instanceSize" id="instanceSize">
            <option value="micro">Micro</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
          <button onclick="showAlert('Please wait... Resizing your server'); resizeServer();">Resize</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="admin-section" id="adminSection" style="display: none;">
      <p class="section-label">Admin List</p>
      <div class="card admin-card">
        <h3>Steam IDs</h3>
        <div class="admin-input-row">
          <input type="text" id="steamIdInput" placeholder="Enter Steam ID (17 digits)" maxlength="17" />
          <button onclick="addAdmin()">Add</button>
        </div>
        <ul id="adminListItems" class="admin-list"></ul>
      </div>
    </div>

    <div class="alert">
      <p class="alertmsg" style="display:inline;">Doing the things you asked.</p>
      <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
    </div>

  </div>

  <div class="footer">
    <p>Valheim Server Manager</p>
  </div>

  <script>
  </script>

</body>

</html>
